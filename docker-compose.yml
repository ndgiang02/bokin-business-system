version: "3.8"

services:

  nginx:
    image: nginx:latest
    container_name: workflow_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web
      - server
    networks:
      - workflow-network

  mysql:
    image: mysql
    container_name: workflow_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: workflow_db
    ports:
      - "3307:3306"
    volumes:
      - ./database:/docker-entrypoint-initdb.d
    networks:
      - workflow-network

  server:
    build: ./server
    container_name: workflow_server
    restart: always
    ports:
      - "5002:5000"
    depends_on:
      - mysql
      - minio
    environment:
      #MYSQL
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: workflow_db
      DATABASE_URL: mysql://root:root@mysql:3306/workflow_db

      #MINIO
      MINIO_ENDPOINT:   minio
      MINIO_PORT:       9000
      MINIO_USE_SSL:    "false"
      MINIO_ACCESS_KEY: root
      MINIO_SECRET_KEY: 12345678
      MINIO_BUCKET:     business-system
      # CORS
      ALLOWED_ORIGIN:   http://localhost:3000 
    networks:
      - workflow-network

  web:
    build: ./web
    container_name: workflow_web
    restart: always
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL:          http://localhost:5002 
      VITE_MINIO_ENDPOINT:   http://localhost:9000
      VITE_MINIO_BUCKET:     business-system
    depends_on:
      - minio
      - server
    networks:
      - workflow-network

  # MinIO 
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"  
    environment:
      MINIO_ROOT_USER: root
      MINIO_ROOT_PASSWORD: 12345678
    command: server /data --console-address ":9001"
    volumes:
      #
      # Linux / Mac:
      - /Users/macbook/Desktop/business-system:/data
      #
      # Windows
      # - C:/minio-data/business-system:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - workflow-network
 
  # Tạo bucket khi khởi động lần đầu
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 root 12345678 &&
        mc mb --ignore-existing local/business-system &&
        mc anonymous set public local/business-system &&
        echo 'Bucket ready!'
      "
    networks:
      - workflow-network


networks:
  workflow-network:
    driver: bridge

  # Linux / Mac
#sudo mkdir -p /opt/minio-data/business-system

# Windows (PowerShell)
#New-Item -ItemType Directory -Path "C:\minio-data\business-system"