server {
    listen 80;

    # Frontend
    location / {
        proxy_pass http://workflow_web:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # API
    location /api/ {
        proxy_pass http://workflow_server:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # MinIO
    location /minio/ {
        proxy_pass http://minio:9000/;
    }
}